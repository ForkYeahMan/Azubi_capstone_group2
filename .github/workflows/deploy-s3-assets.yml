name: Deploy Static Assets to S3

# Runs only when code lands on main (after PR checks pass via branch protection).
# Flow: build → upload to s3://bucket/frontend/ → SSM sync on both EC2s → CloudFront invalidation
on:
  push:
    branches: [main]

env:
  BUCKET: group-2-286664220957-us-east-1-an
  REGION: us-east-1

jobs:
  deploy:
    name: Build → S3 → EC2 → CloudFront
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # next build with output:export writes the full static site to out/
      - name: Build static export
        run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      # Upload the full out/ directory to the frontend/ prefix.
      # Two passes so hashed JS/CSS chunks get long-lived immutable headers
      # while HTML files get must-revalidate so CloudFront always re-fetches them.
      - name: Upload to S3 — JS/CSS (immutable)
        run: |
          aws s3 sync out/_next/ \
            s3://${{ env.BUCKET }}/frontend/_next/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Upload to S3 — HTML and public assets
        run: |
          aws s3 sync out/ \
            s3://${{ env.BUCKET }}/frontend/ \
            --delete \
            --exclude "_next/*" \
            --cache-control "public, max-age=0, must-revalidate"

      # ── EC2 sync via SSM ────────────────────────────────────────────────────
      # Instance IDs are stored explicitly in EC2_INSTANCE_IDS secret
      # (space-separated: "i-0bb2773ea9a6be95b i-0213095b44ff10b77").
      # Requires: SSM Agent running on instances + instance profile with
      #           AmazonSSMManagedInstanceCore + s3:GetObject on the bucket.
      - name: SSM — sync S3 to EC2 and restart Apache
        env:
          INSTANCE_IDS: ${{ secrets.EC2_INSTANCE_IDS }}
        run: |
          set -euo pipefail

          if [ -z "$INSTANCE_IDS" ]; then
            echo "EC2_INSTANCE_IDS secret is not set"
            exit 1
          fi

          echo "Target instances: $INSTANCE_IDS"

          # Send the sync + restart command to both instances at once
          COMMAND_ID=$(aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids $INSTANCE_IDS \
            --parameters 'commands=[
              "aws s3 sync s3://group-2-286664220957-us-east-1-an/frontend/ /var/www/html/ --delete --region us-east-1",
              "systemctl restart httpd"
            ]' \
            --comment "Deploy ${{ github.sha }}" \
            --region ${{ env.REGION }} \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          # Wait for each instance and fail fast if any errors
          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Waiting for $INSTANCE_ID..."
            aws ssm wait command-executed \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ${{ env.REGION }}

            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text \
              --region ${{ env.REGION }})

            OUTPUT=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "StandardOutputContent" \
              --output text \
              --region ${{ env.REGION }})

            echo "=== $INSTANCE_ID ($STATUS) ==="
            echo "$OUTPUT"

            if [ "$STATUS" != "Success" ]; then
              ERROR=$(aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text \
                --region ${{ env.REGION }})
              echo "STDERR: $ERROR"
              echo "Deploy failed on $INSTANCE_ID"
              exit 1
            fi
          done

          echo "All instances synced successfully"

      # CloudFront invalidation is not needed:
      # - HTML uses max-age=0,must-revalidate so CloudFront always revalidates
      # - JS/CSS chunks have content-hashed names so stale cache is never served
