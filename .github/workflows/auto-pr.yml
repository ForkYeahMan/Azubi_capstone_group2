name: Auto Create PR on Push

on:
  push:
    branches:
      - development
      - staging

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set PR target branch
        id: target
        run: |
          if [ "${{ github.ref_name }}" = "development" ]; then
            echo "base=staging" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "staging" ]; then
            echo "base=main" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ steps.target.outputs.base }}
          branch: ${{ github.ref_name }}
          title: "[${{ github.ref_name }} → ${{ steps.target.outputs.base }}] ${{ github.event.head_commit.message }}"
          body: |
            ## Auto-generated PR

            **Source branch:** `${{ github.ref_name }}`
            **Target branch:** `${{ steps.target.outputs.base }}`

            **Latest commit:** ${{ github.event.head_commit.message }}
            **Author:** ${{ github.event.head_commit.author.name }}
            **Commit SHA:** ${{ github.sha }}

            ---
            > This PR was automatically created on push to `${{ github.ref_name }}`.
          draft: false
