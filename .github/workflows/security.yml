name: Security Checks

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]
  schedule:
    # Every Monday at 06:00 UTC — catches newly disclosed CVEs
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Only scans production deps — dev tool vulns (eslint, tailwind build chain)
      # are not exploitable at runtime and would produce noise.
      - name: Run pnpm audit
        run: pnpm audit --prod --audit-level=high

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on pull requests — compares base vs head for new vulnerable deps
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Block dependencies with known exploits
          deny-licenses: AGPL-3.0, GPL-2.0, GPL-3.0

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # TruffleHog is free for all repo types (no license required)
      - name: Scan for secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified
