name: Security Checks

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]
  schedule:
    # Every Monday at 06:00 UTC — catches newly disclosed CVEs
    - cron: "0 6 * * 1"

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails the job on high or critical severity vulnerabilities
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    # Only runs on pull requests — compares base vs head for new vulnerable deps
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          # Block dependencies with known exploits
          deny-licenses: AGPL-3.0, GPL-2.0, GPL-3.0

  secrets-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
