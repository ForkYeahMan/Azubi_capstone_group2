name: Deploy to EC2

# Fires after "Deploy Static Assets to S3" completes successfully on main.
# Downloads the versioned release from S3 to each EC2 instance via SSM
# (no open port 22 needed — EC2s need AmazonSSMManagedInstanceCore IAM policy).
# Rolling deploy: EC2-1 is updated and health-checked before EC2-2 starts.
on:
  workflow_run:
    workflows: ["Deploy Static Assets to S3"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to ${{ matrix.label }}
    runs-on: ubuntu-latest
    # Only proceed when the upstream workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    strategy:
      max-parallel: 1  # rolling — keeps at least one instance healthy at all times
      matrix:
        include:
          - label: EC2-1
            host_secret: EC2_HOST_1
          - label: EC2-2
            host_secret: EC2_HOST_2

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to ${{ matrix.label }} via SSM
        env:
          HOST: ${{ secrets[matrix.host_secret] }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha }}
          S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          DEPLOY_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # Resolve instance ID from the public IP stored in EC2_HOST_* secret
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=$HOST" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "Could not resolve instance ID for host $HOST"
            exit 1
          fi

          echo "Instance ID: $INSTANCE_ID"

          # $DEPLOY_SHA/$S3_BUCKET/$DEPLOY_REGION expand on the runner.
          # \$ escapes pass through as literal $ for the remote shell.
          SCRIPT=$(cat <<REMOTE
          set -euo pipefail
          SHA="$DEPLOY_SHA"
          S3_BUCKET="$S3_BUCKET"
          REGION="$DEPLOY_REGION"
          APP_DIR=/opt/app
          RELEASES_DIR=\$APP_DIR/releases
          RELEASE_DIR=\$RELEASES_DIR/\$SHA

          echo "==> Downloading release \$SHA from S3"
          mkdir -p "\$RELEASE_DIR"
          aws s3 cp "s3://\$S3_BUCKET/releases/\$SHA.tar.gz" /tmp/release.tar.gz --region "\$REGION"

          echo "==> Extracting release"
          tar -xzf /tmp/release.tar.gz -C "\$RELEASE_DIR"
          rm -f /tmp/release.tar.gz

          [ -f "\$APP_DIR/.env.local" ] && cp "\$APP_DIR/.env.local" "\$RELEASE_DIR/.env.local"

          echo "==> Switching current symlink"
          ln -sfn "\$RELEASE_DIR" "\$APP_DIR/current"

          echo "==> Restarting application"
          cd "\$APP_DIR/current"
          PORT=3000 pm2 describe nextjs-app > /dev/null 2>&1 && pm2 restart nextjs-app || pm2 start server.js --name nextjs-app -e /dev/null -o /dev/null
          pm2 save

          echo "==> Pruning old releases (keep last 5)"
          ls -t "\$RELEASES_DIR" | tail -n +6 | xargs -I {} rm -rf "\$RELEASES_DIR/{}" || true

          echo "==> Deploy complete"
          REMOTE
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(printf '{"commands":[%s]}' "$(echo "$SCRIPT" | jq -Rs .)")" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID"

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query 'Status' \
            --output text)

          if [ "$STATUS" != "Success" ]; then
            echo "==> Deploy failed. Remote stderr:"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'StandardErrorContent' \
              --output text
            exit 1
          fi

      - name: Health check ${{ matrix.label }}
        run: |
          HOST="${{ secrets[matrix.host_secret] }}"
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            curl -sf "http://$HOST:3000/" -o /dev/null && echo "OK" && exit 0
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
